<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiCrop — Smart Crop Recommendation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🌱 OptiCrop</div>
    <span class="nav-tag">Smart Agricultural Engine</span>
  </nav>

  <main class="container">
    <div class="hero">
      <h1>Find Your Best Crop</h1>
      <p>Enter your soil and weather conditions below.
         Our AI will recommend the most suitable crop
         for maximum yield.</p>
    </div>

    <form action="/predict" method="POST" class="crop-form">

      <div class="form-section">
        <h2 class="section-title">🌿 Soil Nutrients</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="nitrogen">Nitrogen (N) <span class="unit">kg/ha</span></label>
            <input type="number" id="nitrogen" name="nitrogen"
                   placeholder="e.g. 90" min="0" max="140"
                   step="0.1" required>
          </div>
          <div class="form-group">
            <label for="phosphorus">Phosphorus (P) <span class="unit">kg/ha</span></label>
            <input type="number" id="phosphorus" name="phosphorus"
                   placeholder="e.g. 42" min="0" max="145"
                   step="0.1" required>
          </div>
          <div class="form-group">
            <label for="potassium">Potassium (K) <span class="unit">kg/ha</span></label>
            <input type="number" id="potassium" name="potassium"
                   placeholder="e.g. 43" min="0" max="205"
                   step="0.1" required>
          </div>
          <div class="form-group">
            <label for="ph">Soil pH <span class="unit">0–14</span></label>
            <input type="number" id="ph" name="ph"
                   placeholder="e.g. 6.5" min="0" max="14"
                   step="0.01" required>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">🌤️ Weather Conditions</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="temperature">Temperature <span class="unit">°C</span></label>
            <input type="number" id="temperature" name="temperature"
                   placeholder="e.g. 21" min="0" max="50"
                   step="0.1" required>
          </div>
          <div class="form-group">
            <label for="humidity">Humidity <span class="unit">%</span></label>
            <input type="number" id="humidity" name="humidity"
                   placeholder="e.g. 82" min="0" max="100"
                   step="0.1" required>
          </div>
          <div class="form-group">
            <label for="rainfall">Rainfall <span class="unit">mm</span></label>
            <input type="number" id="rainfall" name="rainfall"
                   placeholder="e.g. 210" min="0" max="300"
                   step="0.1" required>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-predict">
        🔍 Recommend Best Crop
      </button>

    </form>
  </main>

  <footer>
    <p>OptiCrop · Powered by Machine Learning · Built with Flask</p>
  </footer>

</body>
</html>
